<!DOCTYPE html>
<html>
<head>

<title>Orange Recruitment AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f6f6f6;
display:flex;
height:100vh;
}

.sidebar{
width:220px;
background:#ff6a00;
color:white;
padding:20px;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
padding:15px;
font-weight:bold;
border-bottom:1px solid #ddd;
background:white;
}

#chat{
flex:1;
overflow:auto;
padding:20px;
}

.message{
max-width:70%;
padding:12px 16px;
border-radius:12px;
margin-bottom:12px;
line-height:1.5;
}

.user{
background:#ff6a00;
color:white;
margin-left:auto;
}

.bot{
background:white;
border:1px solid #ddd;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.sources{
font-size:12px;
color:gray;
margin-top:5px;
}

.input-area{
display:flex;
padding:15px;
border-top:1px solid #ddd;
background:white;
}

input{
flex:1;
padding:12px;
border-radius:20px;
border:1px solid #ccc;
}

button{
margin-left:10px;
padding:12px 18px;
border:none;
background:#ff6a00;
color:white;
border-radius:20px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>🟧 Orange AI</h2>
<p>Recruitment Assistant</p>

</div>

<div class="main">

<div class="header">Chat</div>

<div id="chat"></div>

<div class="input-area">

<input id="question"
placeholder="Ask about recruitment..." 
onkeypress="if(event.key==='Enter') sendMessage()">

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script>

const chat=document.getElementById("chat")

function addMessage(text,type,sources=[]){

const div=document.createElement("div")

div.className="message "+type

function formatText(text){

text = text.replace(/\*\*/g,"")        // remove **bold**
text = text.replace(/\*/g,"• ")        // convert * to bullet
text = text.replace(/\n/g,"<br>")      // new lines

return text
}

div.innerHTML=formatText(text)

if(sources.length){

const s=document.createElement("div")
s.className="sources"
s.innerText="Sources: "+sources.join(", ")

div.appendChild(s)

}

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

async function sendMessage(){

const input=document.getElementById("question")

const question=input.value.trim()

if(!question) return

addMessage(question,"user")

input.value=""

const r=await fetch("/query",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
question
})

})

const data=await r.json()

addMessage(data.answer,"bot",data.sources)

}

window.onload=()=>{

addMessage(
"Hello 👋 I am Orange Group’s Recruitment Assistant. How may I help you today?",
"bot"
)

}

</script>

</body>
</html>
